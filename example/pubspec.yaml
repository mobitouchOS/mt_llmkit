name: mt_llmkit_example
description: "Demonstrates how to use the llmcpp plugin."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  path_provider: ^2.1.5

  mt_llmkit:
    path: ../

  cupertino_icons: ^1.0.8

  file_picker: ^8.1.2

  read_pdf_text: ^0.3.1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true